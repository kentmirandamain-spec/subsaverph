services:
  - type: web
    name: subsaverph
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 server:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SECRET_KEY
        generateValue: true
      - key: FORCE_HTTPS
        value: "1"
