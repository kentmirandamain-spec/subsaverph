services:
  - type: web
    name: subsaverph
    runtime: python
    plan: free
    region: oregon
    buildCommand: python3 -m pip install --target ./_deps -r requirements.txt
    startCommand: python3 run.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: PYTHONPATH
        value: "./_deps"
      - key: SECRET_KEY
        generateValue: true
      - key: FORCE_HTTPS
        value: "1"
      - key: PAYMENT_MODE
        value: "live"
      - key: PUBLIC_URL
        value: "https://subsaverph.com"
      - key: ALLOW_DEMO_CHECKOUT
        value: "0"
      - key: LIQPAY_TRUST_RETURN
        value: "0"
      # Set in Render Dashboard → Environment (do not commit the real key)
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        value: "grok-4.5"
