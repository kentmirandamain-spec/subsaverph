services:
  - type: web
    name: subsaverph
    runtime: python
    plan: free
    region: oregon
    buildCommand: python3 -m pip install --upgrade pip && python3 -m pip install -r requirements.txt
    startCommand: python3 run.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: SECRET_KEY
        generateValue: true
      - key: FORCE_HTTPS
        value: "1"
      - key: PAYMENT_MODE
        value: "instant_demo"
      - key: PUBLIC_URL
        value: "https://subsaverph.onrender.com"
