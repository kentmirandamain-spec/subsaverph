# Second keep-alive staggered from the main workflow.
# Uses the custom domain only.

name: Keep Render awake (offset)

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Ping health
        run: |
          set -e
          URL="${{ vars.KEEP_ALIVE_URL }}"
          if [ -z "$URL" ]; then
            URL="https://subsaverph.com/api/health"
          fi
          echo "Pinging $URL"
          if curl -fsS --max-time 50 -H "User-Agent: SubSaverPH-KeepAlive/1.0" "$URL"; then
            echo ""
            echo "OK — $URL"
            exit 0
          fi
          echo "Offset ping failed (non-fatal if primary workflow succeeds)"
          exit 1
