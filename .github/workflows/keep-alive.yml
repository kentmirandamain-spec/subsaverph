# Keep SubSaverPH awake on Render free tier.
# Pings health every ~5 minutes so the free instance does not sleep.
# Site runs on Render — your PC / admin login can be offline.
#
# True zero-cold-start 24/7: Render Dashboard → Instance Type → Starter (~$7/mo)
# or set plan: starter in render.yaml

name: Keep Render awake

on:
  schedule:
    # Every 5 minutes (GitHub may delay a few minutes under load)
    - cron: "*/5 * * * *"
  workflow_dispatch: # manual "Run workflow" button

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Ping store health (keep free instance awake)
        run: |
          set -e
          # Custom domain first (canonical), then Render hostname as backup
          URLS=(
            "${{ vars.KEEP_ALIVE_URL }}"
            "https://subsaverph.com/api/health"
            "https://subsaverph.onrender.com/api/health"
          )

          # Deduplicate empty / repeated URLs
          SEEN=""
          OK=0
          for RAW in "${URLS[@]}"; do
            URL="$(echo "$RAW" | xargs)"
            [ -z "$URL" ] && continue
            case " $SEEN " in
              *" $URL "*) continue ;;
            esac
            SEEN="$SEEN $URL"

            echo "==== Pinging $URL ===="
            for i in 1 2 3 4 5 6; do
              if curl -fsS --max-time 55 -H "User-Agent: SubSaverPH-KeepAlive/1.0" "$URL"; then
                echo ""
                echo "OK (attempt $i) — $URL"
                OK=1
                break
              fi
              echo "Attempt $i failed for $URL — retry in 12s (cold start?)"
              sleep 12
            done
            if [ "$OK" -eq 1 ]; then
              # One successful wake is enough for Render free tier
              exit 0
            fi
          done

          echo "All health URLs failed — site may be down or redeploying"
          exit 1
