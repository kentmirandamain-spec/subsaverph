# Keep SubSaverPH awake on Render free tier by pinging every 5 minutes.
# True 24/7 with no cold starts: upgrade Render plan to Starter (paid).

name: Keep Render awake

on:
  schedule:
    # Every 5 minutes (GitHub may delay slightly under load)
    - cron: "*/5 * * * *"
  workflow_dispatch: # manual "Run workflow" button

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          set -e
          URL="${{ vars.KEEP_ALIVE_URL }}"
          if [ -z "$URL" ]; then
            URL="https://subsaverph.onrender.com/api/health"
          fi
          echo "Pinging $URL"
          # Retry a few times in case of cold start
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 45 "$URL"; then
              echo ""
              echo "OK (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          echo "All attempts failed"
          exit 1
