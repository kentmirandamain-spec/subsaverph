# Keep SubSaverPH awake on Render free tier.
# Pings the custom domain health URL every ~5 minutes.
# Site runs on Render — your PC / admin login can be offline.
#
# True zero-cold-start 24/7: Render Dashboard → Instance Type → Starter (~$7/mo)

name: Keep Render awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Ping store health (keep free instance awake)
        run: |
          set -e
          # Prefer repo variable if set; default to production custom domain
          URL="${{ vars.KEEP_ALIVE_URL }}"
          if [ -z "$URL" ]; then
            URL="https://subsaverph.com/api/health"
          fi

          echo "==== Pinging $URL ===="
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 55 -H "User-Agent: SubSaverPH-KeepAlive/1.0" "$URL"; then
              echo ""
              echo "OK (attempt $i) — $URL"
              exit 0
            fi
            echo "Attempt $i failed — retry in 12s (cold start?)"
            sleep 12
          done

          echo "Health ping failed — site may be down or redeploying"
          exit 1
