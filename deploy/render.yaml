# Deploy on Render.com for a permanent free URL like:
# https://subsaverph.onrender.com
#
# Steps:
# 1. Push this project to GitHub
# 2. https://dashboard.render.com → New → Blueprint
# 3. Connect the repo

services:
  - type: web
    name: subsaverph
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT server:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
